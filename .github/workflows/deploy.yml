name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/fuadporoshtica/srt-translator

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to k3s via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 153.92.156.137
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            ssh proxmox "pct exec 211 -- bash -c 'KUBECONFIG=/etc/rancher/k3s/k3s.yaml /usr/local/bin/kubectl rollout restart deployment/srt-translator -n default && /usr/local/bin/kubectl rollout status deployment/srt-translator -n default --timeout=120s'"
